<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unenrollment Docs</title>

  <!-- Code-like font -->
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050505;
      font-family: 'Source Code Pro', monospace;
      color: white;
      overflow: hidden;
    }

    /* HEX GRID LAYER */
    .grid {
      position: fixed;
      width: 200%;
      height: 200%;
      top: 0;
      left: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='70' viewBox='0 0 60 52'><polygon points='30,1 59,15 59,37 30,51 1,37 1,15' fill='none' stroke='rgba(255,255,255,0.25)' stroke-width='1'/></svg>");
      background-size: 80px 70px;
      animation: moveGrid 20s linear infinite;
      opacity: 0.7;
    }

    @keyframes moveGrid {
      0% {
        transform: translate(0, 0);
      }
      100% {
        transform: translate(-80px, -70px);
      }
    }

    /* Title styling */
    h1 {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 4rem;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
      margin: 0;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="grid"></div>

  <h1>Unenrollment Docs</h1>

</body>
</html>
